  - entity_id: runite_ore
    seed: 1009
    prompt: >-
      pixel art, 16-bit RPG item sprite of a chunk of runite ore, glowing
      cyan blue magical metallic veins in dark grey rock, chunky
      silhouette, plain white background, top-down 3/4 view, crisp pixels,
