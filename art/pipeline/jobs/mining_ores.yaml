  - entity_id: platinum_ore
    seed: 1010
    prompt: >-
      pixel art, 16-bit RPG item sprite of a chunk of platinum ore, pale
      white-blue shimmering metallic veins in light grey rock, chunky
      silhouette, plain white background, top-down 3/4 view, crisp pixels,
