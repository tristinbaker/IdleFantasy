# Builds the Android APK and publishes a GitHub Release.
#
# Triggered by:
#   - push to main             → auto-builds with tag "v<versionName>.<run_number>"
#                                (e.g. v1.2.3-alpha.42), published as pre-release.
#                                Fires every time a PR is merged into main.
#   - push of a v* tag         → uses that tag verbatim
#     v1.2.3-alpha   → pre-release
#     v1.2.3-beta.2  → pre-release
#     v1.2.3-rc.1    → pre-release
#     v1.2.3         → regular release
#
# Signing
# -------
# If the repository defines the following secrets, the workflow produces a
# signed release APK using the project's release signing config:
#   ANDROID_KEYSTORE_BASE64   base64-encoded JKS keystore file
#   DEFIDE_STORE_PASSWORD     keystore password
#   DEFIDE_KEY_PASSWORD       key password for the "defide" alias
#
# Without those secrets, the workflow still builds a release APK; it will be
# unsigned (you'll need to sign it locally with apksigner before sideloading).

name: Release

on:
  push:
    branches:
      - main
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Compute release tag
        id: tag
        run: |
          set -euo pipefail
          if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            tag="${GITHUB_REF_NAME}"
            echo "Using pushed tag: $tag"
          else
            version=$(grep -E '^\s*versionName\s*=' app/build.gradle.kts \
                      | head -n1 \
                      | sed -E 's/.*versionName\s*=\s*"([^"]+)".*/\1/')
            if [[ -z "$version" ]]; then
              echo "Could not parse versionName from app/build.gradle.kts" >&2
              exit 1
            fi
            tag="v${version}.${GITHUB_RUN_NUMBER}"
            echo "Computed tag for main push: $tag"
          fi
          echo "value=$tag" >> "$GITHUB_OUTPUT"

      - name: Decode release keystore
        if: ${{ env.ANDROID_KEYSTORE_BASE64 != '' }}
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          mkdir -p "$HOME/.android"
          echo "$ANDROID_KEYSTORE_BASE64" | base64 -d > "$HOME/.android/defide-release.jks"

      - name: Build release APK
        env:
          DEFIDE_STORE_PASSWORD: ${{ secrets.DEFIDE_STORE_PASSWORD }}
          DEFIDE_KEY_PASSWORD: ${{ secrets.DEFIDE_KEY_PASSWORD }}
        run: ./gradlew --no-daemon assembleRelease

      - name: Locate APK
        id: apk
        run: |
          set -euo pipefail
          apk=$(find app/build/outputs/apk/release -maxdepth 1 -name '*.apk' | head -n1)
          if [ -z "$apk" ]; then
            echo "No APK produced under app/build/outputs/apk/release/" >&2
            exit 1
          fi
          tag="${{ steps.tag.outputs.value }}"
          renamed="idlefantasy-${tag}.apk"
          cp "$apk" "$renamed"
          echo "path=$renamed" >> "$GITHUB_OUTPUT"
          echo "name=$renamed" >> "$GITHUB_OUTPUT"

      - name: Determine pre-release flag
        id: prerelease
        run: |
          tag="${{ steps.tag.outputs.value }}"
          # Auto-builds from main always count as pre-release. Tag pushes are
          # pre-release iff the tag carries an -alpha / -beta / -rc suffix.
          if [[ "${GITHUB_REF}" != refs/tags/* ]]; then
            echo "value=true" >> "$GITHUB_OUTPUT"
          elif [[ "$tag" =~ -(alpha|beta|rc) ]]; then
            echo "value=true" >> "$GITHUB_OUTPUT"
          else
            echo "value=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.value }}
          name: ${{ steps.tag.outputs.value }}
          generate_release_notes: true
          prerelease: ${{ steps.prerelease.outputs.value }}
          files: ${{ steps.apk.outputs.path }}
