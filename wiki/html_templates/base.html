<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ page_title }} — Idle Fantasy Wiki</title>
  <link rel="stylesheet" href="assets/style.css?v=3">
  <link rel="icon" type="image/x-icon" href="assets/images/{{ icon }}">
  <script data-goatcounter="https://idlefantasy.goatcounter.com/count"
          async src="//gc.zgo.at/count.js"></script>
  <script>
    (function() {
      var stored = localStorage.getItem('theme');
      var prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
      document.documentElement.setAttribute('data-theme', stored || (prefersDark ? 'dark' : 'light'));
    })();
  </script>
</head>
<body>
  <header class="site-header">
    <button id="nav-toggle" class="nav-toggle" aria-label="Open navigation" aria-expanded="false">&#9776;</button>
    <a class="site-title" href="index.html">
      <span class="site-icon">&#9876;&#65039;</span>
      Idle Fantasy Wiki
    </a>
    <span class="site-tagline">Community reference for all skills, combat, and crafting</span>
    <button id="theme-toggle" class="theme-toggle" aria-label="Toggle dark mode" title="Toggle dark mode"></button>
  </header>

  <div id="nav-backdrop" class="nav-backdrop"></div>

  <div class="layout">
    <nav id="sidebar" class="sidebar" aria-label="Wiki navigation">
      {{ nav }}
    </nav>

    <main class="content">
      {{ content }}
    </main>
  </div>

  <footer class="site-footer">
    <span>All data is auto-generated from game files and stays up to date with the latest release.</span>
    <span>·</span>
    <a href="https://github.com/tristinbaker/IdleFantasy/issues" target="_blank" rel="noopener">Report an issue</a>
    <span>·</span>
    <a href="https://github.com/tristinbaker/IdleFantasy" target="_blank" rel="noopener">GitHub</a>
  </footer>

  <script>
    (function() {
      // ---- Dark mode ----
      var themeBtn = document.getElementById('theme-toggle');
      function updateThemeIcon() {
        themeBtn.textContent = document.documentElement.getAttribute('data-theme') === 'dark' ? '☀️' : '🌙';
      }
      updateThemeIcon();
      themeBtn.addEventListener('click', function() {
        var next = document.documentElement.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
        document.documentElement.setAttribute('data-theme', next);
        localStorage.setItem('theme', next);
        updateThemeIcon();
      });

      // ---- Hamburger nav ----
      var navToggle = document.getElementById('nav-toggle');
      var sidebar   = document.getElementById('sidebar');
      var backdrop  = document.getElementById('nav-backdrop');
      function openNav() {
        sidebar.classList.add('open');
        backdrop.classList.add('visible');
        navToggle.setAttribute('aria-expanded', 'true');
      }
      function closeNav() {
        sidebar.classList.remove('open');
        backdrop.classList.remove('visible');
        navToggle.setAttribute('aria-expanded', 'false');
      }
      navToggle.addEventListener('click', function() {
        sidebar.classList.contains('open') ? closeNav() : openNav();
      });
      backdrop.addEventListener('click', closeNav);
      sidebar.addEventListener('click', function(e) {
        if (e.target.tagName === 'A') closeNav();
      });
    })();
  </script>
</body>
</html>
